<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="logo-frame">
          <img src="/logo.webp" alt="DeValk advies">
        </span>
        <span class="brand-copy">
          <strong>DeValk advies</strong>
          <small>bouwkostenadvies</small>
        </span>
      </a>
      <nav class="brand-nav" aria-label="Werkgebieden">
        <span>Budgetteren</span>
        <span>Begroten</span>
        <span>Bewaken</span>
        <span>Beoordelen</span>
      </nav>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
