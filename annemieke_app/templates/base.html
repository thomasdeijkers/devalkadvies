<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260604">
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <a class="brand-card" href="/">
          <span class="logo-frame">
            <img src="/logo.webp" alt="DeValk advies">
          </span>
          <span class="brand-copy">
            <strong>DeValk advies</strong>
            <small>Begrotingsparser</small>
          </span>
        </a>
        <nav class="side-nav" aria-label="Hoofdmenu">
          <a class="active" href="/"><span>Overzicht</span><i></i></a>
          <a href="/"><span>Inkomende stukken</span><i></i></a>
          <a href="/"><span>Parser regels</span><i class="warn"></i></a>
          <a href="/"><span>Excel exports</span><i></i></a>
          <a href="/"><span>Controle</span><i></i></a>
          <a href="/"><span>Instellingen</span><i class="idle"></i></a>
        </nav>
        <div class="sidebar-footer">
          <span>Werkgebieden</span>
          <strong>Budgetteren · Begroten · Bewaken · Beoordelen</strong>
        </div>
      </aside>
      <main class="main-panel">
        <header class="topbar">
          <div>
            <span class="eyebrow">Bouwkostenadvies</span>
            <h1>{% block page_title %}Werkbak voor begrotingen{% endblock %}</h1>
          </div>
          <div class="top-actions">
            <a href="/" class="ghost-button">Dashboard</a>
            <a href="https://www.devalkadvies.nl/" class="ghost-button">Website</a>
          </div>
        </header>
        <section class="shell">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>
  </body>
</html>
